<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>灵动岛周长流光任务栏</title>
    <style>
        /* ================= 1. 基础页面背景 ================= */
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background: radial-gradient(circle at center, #1a233a 0%, #0d1117 100%);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
            user-select: none;
        }

        .tip {
            color: rgba(255, 255, 255, 0.4);
            font-size: 14px;
            margin-bottom: auto;
            margin-top: 40px;
            letter-spacing: 2px;
        }

        /* ================= 2. 灵动岛大胶囊容器 ================= */
        .dock-container {
            position: relative;
            bottom: 40px;
            height: 64px;
            min-width: 320px;
            padding: 0 16px;
            background: rgba(20, 20, 20, 0.85);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-radius: 32px;
            display: flex;
            align-items: center;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8), 
                        inset 0 1px 1px rgba(255, 255, 255, 0.1);
            /* 苹果物理果冻质感过渡 */
            transition: 
                height 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275),
                padding 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-sizing: border-box;
            z-index: 10;
        }

        .dock-items {
            display: flex;
            align-items: center;
            gap: 12px;
            width: 100%;
            height: 100%;
            z-index: 2; /* 确保内容在流光之上 */
        }

        /* ================= 3. 图标及右侧扩展区域 ================= */
        .dock-item {
            display: flex;
            align-items: center;
            height: 48px;
            border-radius: 24px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            cursor: pointer;
            overflow: hidden;
            max-width: 48px; 
            transition: max-width 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275), background 0.3s;
            box-sizing: border-box;
        }

        .icon-wrapper {
            width: 48px;
            height: 48px;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-shrink: 0;
            transition: transform 0.3s ease;
        }

        .icon-wrapper svg { width: 24px; height: 24px; }

        .expanded-content {
            opacity: 0;
            white-space: nowrap;
            visibility: hidden;
            transition: opacity 0.2s ease, visibility 0.2s ease;
            padding-left: 8px;
            padding-right: 20px;
            color: #ffffff;
            display: flex;
            align-items: center;
        }

        .info-title { font-size: 14px; font-weight: 600; margin-right: 8px; }
        .info-sub { font-size: 12px; color: rgba(255, 255, 255, 0.6); }

        /* Hover 伸展 */
        .dock-item:hover {
            max-width: 350px; 
            background: rgba(255, 255, 255, 0.12);
        }

        .dock-item:hover .expanded-content {
            opacity: 1;
            visibility: visible;
            transition: opacity 0.4s ease 0.15s, visibility 0.4s ease 0.15s;
        }

        /* ================= 4. 核心：严格围绕周长奔跑的流光线 ================= */
        .glow-border {
            position: absolute;
            /* 这里的 inset 要盖住外边缘 */
            inset: -1.5px; 
            border-radius: 33.5px; /* 略微大于宿主的 32px，保证圆角完美重合 */
            padding: 1.5px; /* 线条粗细 */
            
            /* 使用 @property 动态定义的角度渐变（让光线尖端沿着胶囊边缘完美走线，而不是中心硬转） */
            background: conic-gradient(from var(--glow-angle), transparent 70%, var(--active-glow, transparent) 100%);
            
            /* 遮罩黑科技：只漏出 1.5px 的边框部分 */
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        /* 声明自定义 CSS 属性，让渐变角度可以被 CSS 动画平滑驱动 */
        @property --glow-angle {
            syntax: '<angle>';
            initial-value: 0deg;
            inherits: false;
        }

        /* 周长奔跑动画 */
        @keyframes longitudinalRun {
            0% { --glow-angle: 0deg; }
            100% { --glow-angle: 360deg; }
        }

        /* 激活周长流光 */
        .dock-container.has-glow .glow-border {
            opacity: 1;
            animation: longitudinalRun 2s linear infinite;
        }

        /* ================= 5. 音乐音轨动画 ================= */
        .music-anim {
            display: flex;
            align-items: flex-end;
            gap: 2px;
            height: 12px;
            margin-left: 10px;
        }
        .music-bar {
            width: 2px;
            background-color: #ff2d55;
            height: 100%;
            animation: bounce 0.8s ease infinite alternate;
        }
        .music-bar:nth-child(2) { animation-delay: 0.2s; }
        .music-bar:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce {
            0% { height: 2px; }
            100% { height: 14px; }
        }
    </style>
</head>
<body>

    <div class="tip">💡 鼠标移到图标上，观察流光线如何沿着“胶囊周长”奔跑</div>

    <div class="dock-container" id="dock">
        <div class="glow-border"></div>
        
        <div class="dock-items">
            <div class="dock-item" style="--brand-color: #ff2d55;">
                <div class="icon-wrapper">
                    <svg viewBox="0 0 24 24" fill="#ff2d55"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
                </div>
                <div class="expanded-content">
                    <span class="info-title">正在播放</span>
                    <span class="info-sub">夜曲 - 周杰伦</span>
                    <div class="music-anim">
                        <div class="music-bar"></div>
                        <div class="music-bar"></div>
                        <div class="music-bar"></div>
                    </div>
                </div>
            </div>

            <div class="dock-item" style="--brand-color: #4cd964;">
                <div class="icon-wrapper">
                    <svg viewBox="0 0 24 24" fill="#4cd964"><path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/></svg>
                </div>
                <div class="expanded-content">
                    <span class="info-title">未接来电</span>
                    <span class="info-sub">老板 (3分钟前)</span>
                </div>
            </div>

            <div class="dock-item" style="--brand-color: #007aff;">
                <div class="icon-wrapper">
                    <svg viewBox="0 0 24 24" fill="#007aff"><path d="M20.5 3l-.16.03L15 5.1 9 3 3.36 4.9c-.21.07-.36.25-.36.48V20.5c0 .28.22.5.5.5l.16-.03L9 18.9l6 2.1 5.64-1.9c.21-.07.36-.25.36-.48V3.5c0-.28-.22-.5-.5-.5zM15 19l-6-2.11V5l6 2.11V19z"/></svg>
                </div>
                <div class="expanded-content">
                    <span class="info-title">高德导航</span>
                    <span class="info-sub">前方红绿灯右转</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const dock = document.getElementById('dock');
            const dockItems = document.querySelectorAll('.dock-item');

            dockItems.forEach(item => {
                item.addEventListener('mouseenter', () => {
                    const brandColor = item.style.getPropertyValue('--brand-color');
                    
                    // 设置当前流光线颜色
                    dock.style.setProperty('--active-glow', brandColor);
                    dock.classList.add('has-glow');

                    // 灵动岛整体长宽弹性扩展
                    dock.style.height = '72px';
                    dock.style.padding = '0 24px';
                });

                item.addEventListener('mouseleave', () => {
                    dock.classList.remove('has-glow');
                    
                    // 恢复原状
                    dock.style.height = '64px';
                    dock.style.padding = '0 16px';
                });
            });
        });
    </script>
</body>
</html>
